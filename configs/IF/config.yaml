output_dir: "/mnt/md1/elysse/20260409_fgf_zo1_dmkn_fmnl2/analysis"
metadata_json: "/mnt/md1/elysse/20260409_fgf_zo1_dmkn_fmnl2/raw/stack_0_channel_0-DAPI_obj_bottom/Cam_short_00000.json"
rotation_log: "/mnt/md1/elysse/20260409_fgf_zo1_dmkn_fmnl2/analysis/rotation_log.csv"

file_extension: ".tif"

datasets: "20260409_fgf_zo1_dmkn_fmnl2"

microscopy:
  voxel_size_zyx: [1.0, 0.122666664, 0.122666664]
  channels:
    dapi: 0
    gfp: 1
    rfp: 2
    cy5: 3
  channel_names: ["dapi", "zo1", "dmkn", "fmnl2"]

single_file_mode: false

# Optional HDF5 conversion settings. Add these to the same config file for a pipeline-style setup.
h5_conversion:
  root_dir: "/mnt/md1/elysse/2026-04-09_125407/raw"
  dataset_path: null  # optional HDF5 dataset path, e.g. "/images/data"
  #output_dir: "/path/to/your/pipeline/raw_tiffs"  # optional, else raw_data_dir is used
  #pipeline_config: "configs/IF/config20260218.yaml"  # optional if you want output_dir from pipeline config

  auto_crop: true
  auto_crop_channel: 0           # channel index for crop bounds (null = all channels; 0 = DAPI)
  auto_crop_threshold: null      # absolute intensity cutoff (null = use threshold_percentile instead)
  auto_crop_threshold_percentile: 90  # percentile of the DAPI MIP to use as threshold (70 = keep top 30%)
  auto_crop_blur_sigma: 10       # gaussian blur applied to MIP before thresholding (smooths patchy signal)
  pad: 20
  crop: null  # manual crop: y0:y1:x0:x1 or z0:z1:y0:y1:x0:x1
  dtype: "float32"
  confirm_autocrop: true
